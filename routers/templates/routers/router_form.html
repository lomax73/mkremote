{% extends "base.html" %}
{% block title %}{% if object %}Modifica {{ object.nome }}{% else %}Nuovo router{% endif %} — MKRemote{% endblock %}
{% block content %}
<p><a href="{% url 'router-list' %}">&larr; Router</a></p>
<h1>{% if object %}Modifica {{ object.nome }}{% else %}Nuovo router{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Salva</button>
</form>
<script>
(function () {
    var passwordInput = document.getElementById('id_password');
    if (!passwordInput) return;
    var toggleBtn = document.createElement('button');
    toggleBtn.type = 'button';
    toggleBtn.className = 'btn';
    toggleBtn.style.marginTop = '0.4rem';
    toggleBtn.setAttribute('aria-label', 'Mostra password');
    toggleBtn.textContent = '👁 Mostra password';
    passwordInput.insertAdjacentElement('afterend', toggleBtn);
    toggleBtn.addEventListener('click', function () {
        var isHidden = passwordInput.type === 'password';
        passwordInput.type = isHidden ? 'text' : 'password';
        toggleBtn.textContent = isHidden ? '👁 Nascondi password' : '👁 Mostra password';
    });
})();
</script>
{% endblock %}
