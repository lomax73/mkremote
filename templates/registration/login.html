{% load static %}<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — MKRemote</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'img/logo.svg' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --azure: #27a5de;
            --azure-dark: #1c85b8;
            --navy: #123247;
            --ink: #1f2937;
            --border: #e2e8f0;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', system-ui, sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            color: var(--ink);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 0%, #eaf6fc 0%, #f8fafc 55%, #f8fafc 100%);
            position: relative;
            overflow: hidden;
        }
        /* Richiamo discreto dell'anello del logo, molto grande e sfumato, sullo sfondo */
        body::before {
            content: "";
            position: absolute;
            width: 900px; height: 900px;
            border-radius: 50%;
            border: 60px solid var(--azure);
            opacity: 0.06;
            top: -320px;
            right: -320px;
        }
        body::after {
            content: "";
            position: absolute;
            width: 500px; height: 500px;
            border-radius: 50%;
            border: 40px solid var(--navy);
            opacity: 0.05;
            bottom: -220px;
            left: -220px;
        }

        .card {
            position: relative;
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem 2.5rem 2rem;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 40px rgba(18, 50, 71, 0.12);
            text-align: center;
        }
        .card img { width: 72px; height: 72px; margin-bottom: 1rem; }
        .card h1 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            color: var(--navy);
            margin: 0 0 1.5rem;
            font-weight: 700;
        }
        form { text-align: left; }
        p { margin: 0.9rem 0; }
        label { display: block; font-weight: 600; margin-bottom: 0.3rem; font-size: 0.85rem; color: var(--navy); }
        input {
            width: 100%; padding: 0.6rem 0.7rem; box-sizing: border-box;
            border: 1px solid var(--border); border-radius: 8px; font-family: var(--font-body); font-size: 0.95rem;
        }
        input:focus-visible { outline: 2px solid var(--azure); outline-offset: 1px; }
        .btn {
            width: 100%; padding: 0.65rem 1rem; border-radius: 8px;
            background: var(--azure); color: #fff; border: none; cursor: pointer;
            font-size: 1rem; font-weight: 600; font-family: var(--font-body);
            margin-top: 0.5rem;
        }
        .btn:hover { background: var(--azure-dark); }
        .btn:focus-visible { outline: 2px solid var(--navy); outline-offset: 2px; }
        .errorlist { list-style: none; padding: 0; margin: 0 0 1rem; color: #991b1b; font-size: 0.85rem; }
        .footer-note { margin-top: 1.5rem; font-size: 0.75rem; color: #94a3b8; }
    </style>
</head>
<body>
<div class="card">
    <img src="{% static 'img/logo.svg' %}" alt="MKRemote">
    <h1>MKRemote</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <p>
            <label for="{{ form.username.id_for_label }}">Username</label>
            {{ form.username }}
            {{ form.username.errors }}
        </p>
        <p>
            <label for="{{ form.password.id_for_label }}">Password</label>
            {{ form.password }}
            {{ form.password.errors }}
        </p>
        <button class="btn" type="submit">Accedi</button>
    </form>
    <p class="footer-note">FBO Solution</p>
</div>
</body>
</html>
